<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to SkillSnap AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
    <style>
        /* Specific Landing Page Styles Overrides */
        body { overflow-x: hidden; }
        .landing-container { display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; padding: 2rem; }
        .landing-hero { text-align: center; max-width: 600px; margin-bottom: 2rem; }
        .landing-hero h1 { font-size: 3.5rem; margin-bottom: 1rem; line-height: 1.1; }
        .landing-hero p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem; }
        
        .auth-container { width: 100%; max-width: 400px; }
        .auth-card { padding: 2.5rem; position: relative; overflow: hidden; }
        .auth-tabs { display: flex; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .auth-tab { flex: 1; text-align: center; padding: 1rem; cursor: pointer; color: var(--text-muted); font-weight: 600; transition: all 0.3s ease; }
        .auth-tab.active { color: white; border-bottom: 2px solid var(--accent-purple); }
        
        .auth-form { display: none; flex-direction: column; gap: 1rem; }
        .auth-form.active { display: flex; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; text-align: left; }
        .form-group label { font-size: 0.9rem; font-weight: 500; color: #ccc; }
        .form-group input { padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-family: 'Outfit'; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .form-group input:focus { border-color: var(--accent-purple); }
        
        .auth-btn { margin-top: 1rem; padding: 1rem; font-size: 1.1rem; justify-content: center; width: 100%; }
        .auth-error { color: var(--accent-red); font-size: 0.9rem; text-align: center; min-height: 20px; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <div class="landing-container">
        <div class="logo mb-4" style="font-size: 1.5rem; justify-content: center; width: 100%;">
            <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
            <span>Skill<span class="text-gradient">Snap</span> <span class="logo-ai">AI</span></span>
        </div>

        <div class="landing-hero">
            <h1>Frictionless<br><span class="text-gradient-anim">Micro-Learning</span></h1>
            <p>Turn your 5-minute coffee break into a powerful learning session powered by AI.</p>
        </div>

        <div class="auth-container">
            <div class="auth-card glass-panel">
                <div class="auth-tabs">
                    <div class="auth-tab active" id="tab-login">Login</div>
                    <div class="auth-tab" id="tab-register">Sign Up</div>
                </div>

                <!-- LOGIN FORM -->
                <form id="login-form" class="auth-form active">
                    <div class="auth-error" id="login-error"></div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="primary-btn auth-btn">
                        Sign In <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <!-- REGISTER FORM -->
                <form id="register-form" class="auth-form">
                    <div class="auth-error" id="register-error"></div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="register-name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="register-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="register-password" required placeholder="••••••••" minlength="6">
                    </div>
                    <button type="submit" class="primary-btn auth-btn">
                        Create Account <i class="fa-solid fa-user-plus"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="static/landing.js"></script>
</body>
</html>
